<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Внутренняя ошибка сервера - HolyMeal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        
        .error-code {
            font-size: 120px;
            color: #e74c3c;
            margin: 0;
            line-height: 1;
        }
        
        .error-message {
            font-size: 24px;
            color: #2c3e50;
            margin: 20px 0;
        }
        
        .error-description {
            font-size: 18px;
            color: #7f8c8d;
            margin-bottom: 30px;
            max-width: 600px;
        }
        
        .home-button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.3s;
            margin: 10px;
        }
        
        .home-button:hover {
            background-color: #2980b9;
        }
        
        .refresh-button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #2ecc71;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.3s;
            margin: 10px;
        }
        
        .refresh-button:hover {
            background-color: #27ae60;
        }
        
        .buttons-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-code">500</h1>
        <h2 class="error-message">Внутренняя ошибка сервера</h2>
        <p class="error-description">
            К сожалению, произошла внутренняя ошибка сервера.
            Мы уже работаем над её устранением.
            Пожалуйста, попробуйте обновить страницу или вернитесь позже.
        </p>
        <div class="buttons-container">
            <a href="{{ url_for('index') }}" class="home-button">Вернуться на главную</a>
            <a href="javascript:location.reload()" class="refresh-button">Обновить страницу</a>
        </div>
    </div>
</body>
</html>
